<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     <link rel="stylesheet" href="https://unpkg.com/leaflet-search@2.9.8/dist/leaflet-search.min.css" />

     <style>
        #map { height: 400px; }
        .search-container {
            margin-bottom: 15px;
        }
     </style>
</head>
<body>
    <div id="location" class="section">
        <h2> Location </h2>
        <div class="search-container">
            <input
                id="searchInput"
                type="text"
                class="form-control"
                placeholder="Search address or location..."
                style="margin-bottom: 10px;">
        </div>
        <div id="map"></div>
        <!-- Make sure you put this AFTER Leaflet's CSS -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
           integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
           crossorigin="">
        </script>
        <script src="https://unpkg.com/leaflet-search@2.9.8/dist/leaflet-search.min.js"></script>

        <p id="latlon"> Select your location by clicking on the map </p>
        <div style="display: flex; gap: 20px;">
            <button type = submit id="saveCoordinates"> SAVE COORDINATES </button>
            <p id="save"></p>
            <span id="check" class="checkmark" style="color: green;"></span>
        </div>
    </div>

    <script>
        const latlon = document.getElementById("latlon")
        var map = L.map('map').setView([44.597, -75.168], 10);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>' }).addTo(map);

        var marker = L.marker();
        var lat;
        var lan;

        // Nominatim Search Bar Setup
        function searchAddress() {
            const searchInput = document.getElementById("searchInput").value;

            if (searchInput.trim() === "") {
                alert("Please enter an address");
                return;
            }

            // Clear previous search status
            check = document.getElementById("check")
            check.textContent = '';
            save = document.getElementById("save")
            save.textContent = " not saved";
            save.style.color = "black";

            // Call Nominatim API
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(searchInput))
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const result = data[0];
                        const latitude = parseFloat(result.lat);
                        const longitude = parseFloat(result.lon);

                        // Update map view
                        map.setView([latitude, longitude], 14);

                        // Update marker
                        marker.setLatLng([latitude, longitude]);
                        marker.addTo(map);

                        // Update coordinates
                        lat = latitude;
                        lan = longitude;
                        latlon.textContent = 'Latitude: ' + latitude.toString() + ' Longitude: ' + longitude.toString();
                    } else {
                        alert("Address not found. Please try another search.");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Error searching address. Please try again.");
                });
        }

        // Allow Enter key to trigger search
        document.getElementById("searchInput").addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchAddress();
            }
        });

        function onMapClick(e) {
            // new coordinates not yet saved
            check = document.getElementById("check")
            check.textContent = '';
            save = document.getElementById("save")
            save.textContent = " not saved";
            save.style.color = "black";

            marker.setLatLng(e.latlng);
            marker.addTo(map);
            lat = e.latlng.lat;
            lan = e.latlng.lng;
            latlon.textContent = 'Latitude: ' + e.latlng.lat.toString() + ' Longitude: ' + e.latlng.lng.toString();

            // Clear search input when clicking map
            document.getElementById("searchInput").value = '';
        }

        var button = document.getElementById('saveCoordinates');

        function saveLocation() {
            // show green check and "saved"
            check = document.getElementById("check")
            check.textContent = '✓';
            save = document.getElementById("save")
            save.textContent = "saved";
            save.style.color = "green";

            // Using Fetch API
            fetch('/save_coordinates', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ latitude: lat, longitude: lan})
            })
                .then(response => response.json())
                .then(data => console.log(data))
                .catch(error => console.error('Error:', error));
        }

        map.on('click', onMapClick);
        button.addEventListener('click', saveLocation);

    </script>
</body>
</html>
